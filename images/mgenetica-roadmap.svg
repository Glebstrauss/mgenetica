<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" role="img" aria-labelledby="title desc">
  <title id="title">Roadmap MGenética</title>
  <desc id="desc">Diagrama com quatro etapas: fundamentos, dados simulados, modelos e genômica aplicada.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf6f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#17324d" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="820" height="520" rx="28" fill="url(#panel)"/>
  <path d="M90 372 C210 252, 300 450, 430 300 S610 150, 730 250" fill="none" stroke="#d7e6e6" stroke-width="34" stroke-linecap="round"/>
  <path d="M90 372 C210 252, 300 450, 430 300 S610 150, 730 250" fill="none" stroke="#147d7e" stroke-width="10" stroke-linecap="round"/>
  <g filter="url(#shadow)">
    <rect x="62" y="318" width="170" height="92" rx="16" fill="#ffffff"/>
    <text x="92" y="355" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#17324d">Fundamentos</text>
    <text x="92" y="382" font-family="Arial, sans-serif" font-size="14" fill="#5d6b78">genética quantitativa</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="238" y="236" width="170" height="92" rx="16" fill="#ffffff"/>
    <text x="268" y="273" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#17324d">Dados</text>
    <text x="268" y="300" font-family="Arial, sans-serif" font-size="14" fill="#5d6b78">simulação em R</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="414" y="316" width="170" height="92" rx="16" fill="#ffffff"/>
    <text x="444" y="353" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#17324d">Modelos</text>
    <text x="444" y="380" font-family="Arial, sans-serif" font-size="14" fill="#5d6b78">BLUP e matrizes</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="590" y="170" width="170" height="92" rx="16" fill="#ffffff"/>
    <text x="620" y="207" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#17324d">Genômica</text>
    <text x="620" y="234" font-family="Arial, sans-serif" font-size="14" fill="#5d6b78">SNP, GWAS, predição</text>
  </g>
  <circle cx="92" cy="372" r="16" fill="#c87924"/>
  <circle cx="322" cy="284" r="16" fill="#c87924"/>
  <circle cx="500" cy="362" r="16" fill="#c87924"/>
  <circle cx="676" cy="216" r="16" fill="#c87924"/>
  <text x="62" y="92" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#17324d">Da biologia à decisão</text>
  <text x="62" y="130" font-family="Arial, sans-serif" font-size="18" fill="#5d6b78">Uma rota prática para sair do conceito e chegar à avaliação genética.</text>
</svg>
